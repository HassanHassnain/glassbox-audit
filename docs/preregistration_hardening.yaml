  permutation_samples: 10000
  confidence: 0.95
  practical_margin: 0.02
  margin_rationale: "25% of the preregistered H1 minimum meaningful harmful-score effect of 0.08."
  primary_family:
    - "mean_difference versus selected SAE feature ablation"
    - "linear_probe versus selected SAE feature ablation"
    - "selected SAE versus matched random-SAE controls"
    - "best validation-selected weighted sparse SAE versus mean_difference"
  familywise_correction: "Holm"

