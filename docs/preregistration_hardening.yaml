    - "benign_score_effect"
    - "capability_nll_cost"
    - "hidden_l2"

public_sae_replication:
  analysis_status: "confirmatory"
  preferred_cell: "Gemma-2-9B-it with an instruction-tuned Gemma Scope residual-stream SAE"
  fallback: "No fallback cell will be relabeled as same-checkpoint evidence. Base-to-instruct use must be reported as transfer under weight drift."
  kill_conditions:
    - "No checkpoint-matched instruction-tuned SAE is available."
    - "The declared hook layer or activation width is incompatible."
    - "The model or SAE weights cannot be obtained reproducibly."
    - "The cell cannot run safely on one 24 GiB GPU with documented loading settings."

reporting_policy:
  - "Never edit the 2026-06-19 preregistration."
  - "Do not call an analysis confirmatory when its held-out outcomes were previously inspected."
  - "Preserve failed, null, and killed cells in the evidence bundle."
